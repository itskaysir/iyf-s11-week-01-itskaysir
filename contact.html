<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>
<body>
    <h1>Contact Us</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            <p>
                <label for="full-name">FullName:</label>
                <input type="text" id="full-name" name="full-name" placeholder="Antony Juma" required>
            </p>
            <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="an****@gmail.com" required>
            </p>
            <p>
                <label for="phone">Phone (optional):</label>
                <input type="tel" id="phone" name="phone" placeholder="+254 700 000 000">
            </p>
        </fieldset>
        <fieldset>
            <legend>Message Details</legend>
            <p>
                <label for="subject">Subject:</label>
                <select id="subject" name="subject" required>
                    <option value="">Please choose an option</option>
                    <option value="general">General Inquiry</option>
                    <option value="support">Technical Support</option>
                    <option value="feedback">Feedback</option>
                </select>
            </p>
            <p>
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" minlength="50" placeholder="Please enter your message (minimum 50 characters)..." required></textarea>
            </p>
        </fieldset>
        <p>
            <input type="checkbox" id="newsletter" name="newsletter">
            <label for="newsletter">Subscribe to newsletter</label>
        </p>
        <p>
            <button type="submit">Send Message</button>
        </p>
    </form>
</body>
</html>
